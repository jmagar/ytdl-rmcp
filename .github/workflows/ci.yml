name: ci

on:
  push:
    branches: [main, rust-port]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: [self-hosted, unraid]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2 (v2.9.1)

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --all --locked

  packaging:
    runs-on: [self-hosted, unraid]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install packaging check tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq shellcheck
      - name: Validate plugin packaging
        run: REQUIRE_SHELLCHECK=1 scripts/check-packaging.sh

  npm-launcher:
    runs-on: [self-hosted, unraid]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - name: Test npm launcher
        run: npm test --prefix packages/ytdl-rmcp
      - name: Check npm launcher syntax
        run: npm run check --prefix packages/ytdl-rmcp
      - name: Dry-run npm package
        run: npm pack --dry-run --json ./packages/ytdl-rmcp

  container:
    runs-on: [self-hosted, unraid]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build container image
        run: docker build -t ytdl-rmcp:ci .

  cross-build:
    # Smoke-build the Windows target so cross-compile breakage is caught in CI,
    # not at release time.
    runs-on: [self-hosted, unraid]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2 (v2.9.1)
        with:
          key: windows-msvc
      - name: Install cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm llvm clang lld
          cargo install cargo-xwin --locked
      - name: Cross-build (windows-msvc)
        run: cargo xwin build --release --locked --target x86_64-pc-windows-msvc

  windows-smoke:
    # Native MSVC build + run on real Windows (cd-m4). The cross-build leg above
    # only checks that the Windows target *links*; this leg proves the binary
    # actually starts — catching ring/rustls TLS-stack linkage that links but
    # crashes at runtime on MSVC.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2 (v2.9.1)
        with:
          key: windows-native
      - name: Build (native msvc)
        run: cargo build --release --locked
      - name: Smoke - binary starts and prints version
        shell: pwsh
        run: |
          $exe = "target/release/rytdl.exe"
          $version = & $exe --version
          if ($LASTEXITCODE -ne 0) {
            Write-Error "rytdl.exe --version exited with $LASTEXITCODE"
            exit 1
          }
          Write-Host "smoke ok: $version"
