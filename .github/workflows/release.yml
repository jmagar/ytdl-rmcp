name: release

# Build the cross-platform binaries and attach them to a GitHub Release on tag.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install packaging check tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq shellcheck
      - name: Validate plugin packaging
        run: REQUIRE_SHELLCHECK=1 scripts/check-packaging.sh

  build:
    needs: packaging
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ytdl-mcp-linux-x86_64
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: ubuntu-latest
            artifact: ytdl-mcp-windows-x86_64.exe
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ring assembles x64 Windows asm with NASM; cargo-xwin needs the LLVM
      # toolchain. Both are no-ops for the native Linux target.
      - name: Install cross toolchain
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm llvm clang lld
          cargo install cargo-xwin --locked

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (linux)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (windows cross)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: cargo xwin build --release --target ${{ matrix.target }}

      - name: Stage artifact + checksum
        run: |
          cp "target/${{ matrix.target }}/release/ytdl-mcp${{ matrix.ext }}" "${{ matrix.artifact }}"
          sha256sum "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  mcpb:
    # Bundle the linux + windows binaries into a single .mcpb (MCP bundle) for
    # one-click install in MCPB-capable desktop hosts.
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download linux binary
        uses: actions/download-artifact@v4
        with:
          name: ytdl-mcp-linux-x86_64
          path: dist/linux

      - name: Download windows binary
        uses: actions/download-artifact@v4
        with:
          name: ytdl-mcp-windows-x86_64.exe
          path: dist/windows

      - name: Pack .mcpb
        env:
          LINUX_BIN: dist/linux/ytdl-mcp-linux-x86_64
          WINDOWS_BIN: dist/windows/ytdl-mcp-windows-x86_64.exe
          OUT: ytdl-mcp.mcpb
        run: scripts/build-mcpb.sh

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ytdl-mcp.mcpb
            ytdl-mcp.mcpb.sha256

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ytdl-mcp.mcpb
          path: ytdl-mcp.mcpb

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all
      - run: cargo clippy --all-targets -- -D warnings
