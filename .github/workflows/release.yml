name: release

# Build cross-platform binaries, attach them to a release-please GitHub Release,
# and publish the npm launcher package for stable v* releases.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing release tag to attach assets to, e.g. v0.7.0"
        required: true

permissions:
  contents: write

jobs:
  release-meta:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - id: meta
        name: Resolve release tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            tag="${{ github.event.release.tag_name }}"
            release_name="${{ github.event.release.name }}"
          else
            tag="${{ inputs.tag_name }}"
            if [[ -z "$tag" ]]; then
              echo "::error::tag_name is required for manual releases"
              exit 1
            fi
            release_name="ytdl-rmcp ${tag}"
          fi
          echo "tag_name=${tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"

  packaging:
    needs: release-meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install packaging check tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq shellcheck
      - name: Validate plugin packaging
        run: REQUIRE_SHELLCHECK=1 scripts/check-packaging.sh

  build:
    needs: [release-meta, packaging]
    # contents: write is inherited from the top-level grant; id-token + attestations
    # are the minimal extras needed for keyless build-provenance (cd-h2).
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ytdl-rmcp-linux-x86_64
            archive: ytdl-rmcp-x86_64.tar.gz
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: ubuntu-latest
            artifact: ytdl-rmcp-windows-x86_64.exe
            archive: ytdl-rmcp-windows-x86_64.tar.gz
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)
        with:
          targets: ${{ matrix.target }}

      # ring assembles x64 Windows asm with NASM; cargo-xwin needs the LLVM
      # toolchain. Both are no-ops for the native Linux target.
      - name: Install cross toolchain
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm llvm clang lld
          cargo install cargo-xwin --locked

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2 (v2.9.1)
        with:
          key: ${{ matrix.target }}

      - name: Build (linux)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build (windows cross)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: cargo xwin build --release --locked --target ${{ matrix.target }}

      - name: Stage artifact + checksum
        run: |
          cp "target/${{ matrix.target }}/release/rytdl${{ matrix.ext }}" "${{ matrix.artifact }}"
          sha256sum "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          mkdir -p archive
          cp "${{ matrix.artifact }}" "archive/rytdl${{ matrix.ext }}"
          tar -C archive -czf "${{ matrix.archive }}" "rytdl${{ matrix.ext }}"
          sha256sum "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"

      # Generate a keyless GitHub build-provenance attestation for the binary so
      # consumers can verify it was built by this workflow (cd-h2). No secrets:
      # signing uses the job's OIDC token via id-token: write.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ matrix.artifact }}

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

  mcpb:
    # Bundle the linux + windows binaries into a single .mcpb (MCP bundle) for
    # one-click install in MCPB-capable desktop hosts.
    needs: [release-meta, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Download linux binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ytdl-rmcp-linux-x86_64
          path: dist/linux

      - name: Download windows binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ytdl-rmcp-windows-x86_64.exe
          path: dist/windows

      - name: Pack .mcpb
        env:
          LINUX_BIN: dist/linux/ytdl-rmcp-linux-x86_64
          WINDOWS_BIN: dist/windows/ytdl-rmcp-windows-x86_64.exe
          OUT: ytdl-rmcp.mcpb
        run: scripts/build-mcpb.sh

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ytdl-rmcp.mcpb
          path: |
            ytdl-rmcp.mcpb
            ytdl-rmcp.mcpb.sha256
            ytdl-rmcp.dxt
            ytdl-rmcp.dxt.sha256

  publish-release:
    needs: [release-meta, build, mcpb]
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist/release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ needs.release-meta.outputs.tag_name }}
          name: ${{ needs.release-meta.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          files: dist/release-assets/*

  npm:
    needs: [release-meta, publish-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Verify npm package version matches release tag
        id: npm-version
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.release-meta.outputs.tag_name }}"
          version="$(node -p "require('./packages/ytdl-rmcp/package.json').version")"
          if [[ "$tag" != "v${version}" ]]; then
            echo "::error::release tag ${tag} does not match packages/ytdl-rmcp/package.json version ${version}"
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Test npm launcher
        run: npm test --prefix packages/ytdl-rmcp
      - name: Check npm launcher syntax
        run: npm run check --prefix packages/ytdl-rmcp
      - name: Dry-run npm package
        run: npm pack --dry-run --json ./packages/ytdl-rmcp

      - name: Check whether npm version is already published
        id: published
        shell: bash
        run: |
          set -euo pipefail
          if npm view "ytdl-rmcp@${{ steps.npm-version.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish npm package
        if: steps.published.outputs.exists == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public ./packages/ytdl-rmcp

      - name: Smoke published npm launcher
        shell: bash
        run: |
          set -euo pipefail
          cache="$(mktemp -d)"
          trap 'rm -rf "$cache"' EXIT
          for attempt in {1..12}; do
            if npm view "ytdl-rmcp@${{ steps.npm-version.outputs.version }}" version >/dev/null 2>&1; then
              break
            fi
            if [[ "$attempt" == 12 ]]; then
              npm view "ytdl-rmcp@${{ steps.npm-version.outputs.version }}" version
            fi
            sleep 5
          done
          npm_config_cache="$cache" npx -y "ytdl-rmcp@${{ steps.npm-version.outputs.version }}" --version

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2 (v2.9.1)
      - run: cargo test --all --locked
      - run: cargo clippy --all-targets --locked -- -D warnings
