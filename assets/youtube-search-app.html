<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YouTube search</title>
  <style>
    :root {
      --aurora-page-bg: #07131c;
      --aurora-panel-medium: #102532;
      --aurora-panel-strong: #132d3d;
      --aurora-control-surface: #0d202c;
      --aurora-border-default: #1d3d4e;
      --aurora-border-strong: #2a5870;
      --aurora-text-primary: #e6f4fb;
      --aurora-text-muted: #a7bcc9;
      --aurora-accent-primary: #29b6f6;
      --aurora-accent-pink: #f9a8c4;
      --aurora-active-glow: 0 0 0 1px color-mix(in srgb, var(--aurora-accent-primary) 78%, transparent), 0 0 26px color-mix(in srgb, var(--aurora-accent-primary) 22%, transparent);
      --aurora-radius-1: 8px;
      --aurora-radius-3: 8px;
      --aurora-shadow-strong: 0 24px 70px rgba(0, 0, 0, 0.38);
      color-scheme: dark;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--aurora-page-bg);
      color: var(--aurora-text-primary);
      font: 14px/1.45 Inter, ui-sans-serif, system-ui, sans-serif;
    }
    .shell { padding: 18px; }
    .panel {
      border: 1px solid var(--aurora-border-strong);
      border-radius: var(--aurora-radius-3);
      background: var(--aurora-panel-strong);
      box-shadow: var(--aurora-shadow-strong), inset 0 1px 0 rgba(255,255,255,0.05);
      overflow: hidden;
    }
    .tabs {
      display: flex;
      gap: 1px;
      padding: 8px;
      background: var(--aurora-control-surface);
      border-bottom: 1px solid var(--aurora-border-default);
    }
    .tab {
      height: 34px;
      border-color: transparent;
      background: transparent;
      color: var(--aurora-text-muted);
    }
    .tab[aria-selected="true"] {
      border-color: var(--aurora-border-strong);
      background: color-mix(in srgb, var(--aurora-accent-primary) 16%, var(--aurora-control-surface));
      color: var(--aurora-text-primary);
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 14px;
      background: var(--aurora-panel-medium);
      border-bottom: 1px solid var(--aurora-border-default);
    }
    .toolbar.multi { grid-template-columns: 1fr repeat(3, auto); }
    input {
      min-width: 0;
      height: 40px;
      border-radius: var(--aurora-radius-1);
      border: 1px solid var(--aurora-border-default);
      background: var(--aurora-control-surface);
      color: var(--aurora-text-primary);
      padding: 0 12px;
      font: 560 13px/1 Inter, ui-sans-serif, system-ui, sans-serif;
      outline: none;
    }
    input:focus,
    button:focus-visible { border-color: var(--aurora-border-strong); box-shadow: var(--aurora-active-glow); }
    button {
      height: 40px;
      border-radius: var(--aurora-radius-1);
      border: 1px solid var(--aurora-border-strong);
      background: color-mix(in srgb, var(--aurora-accent-primary) 18%, var(--aurora-control-surface));
      color: var(--aurora-text-primary);
      font: 650 13px/1 Inter, ui-sans-serif, system-ui, sans-serif;
      padding: 0 14px;
      cursor: pointer;
      white-space: nowrap;
    }
    .results { display: grid; gap: 1px; background: var(--aurora-border-default); }
    .result {
      display: grid;
      grid-template-columns: 112px 1fr auto;
      gap: 14px;
      padding: 12px;
      background: var(--aurora-panel-strong);
      border: 1px solid transparent;
    }
    .row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      padding: 12px;
      background: var(--aurora-panel-strong);
      border: 1px solid transparent;
    }
    .candidate { grid-template-columns: auto minmax(0, 1fr); }
    .result[aria-selected="true"] { border-color: var(--aurora-border-strong); box-shadow: inset 3px 0 0 var(--aurora-accent-primary); }
    .thumb {
      width: 112px;
      aspect-ratio: 16 / 9;
      border-radius: 8px;
      object-fit: cover;
      background: var(--aurora-control-surface);
    }
    .title { margin: 0 0 5px; font: 760 14px/1.2 Manrope, Inter, sans-serif; }
    .copy { min-width: 0; }
    .title,
    .meta { overflow-wrap: anywhere; }
    .meta { color: var(--aurora-text-muted); font-size: 12px; }
    .actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .actions button { height: 32px; padding: 0 10px; }
    .actions .download { border-color: color-mix(in srgb, var(--aurora-accent-pink) 55%, var(--aurora-border-strong)); background: color-mix(in srgb, var(--aurora-accent-pink) 13%, var(--aurora-control-surface)); }
    .status,
    .empty { padding: 14px; color: var(--aurora-text-muted); }
    .empty { min-height: 74px; display: grid; place-items: center; text-align: center; }
    .check { width: 18px; height: 18px; margin-top: 2px; accent-color: var(--aurora-accent-primary); }
    @media (max-width: 720px) {
      .toolbar,
      .toolbar.multi { grid-template-columns: 1fr; }
      .tabs { overflow-x: auto; }
      .result { grid-template-columns: 88px 1fr; }
      .thumb { width: 88px; }
      .actions { grid-column: 1 / -1; }
      .row { grid-template-columns: 1fr; }
      .candidate { grid-template-columns: auto minmax(0, 1fr); }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel">
      <nav class="tabs" aria-label="Views">
        <button class="tab" type="button" data-tab="search" aria-selected="true">Search</button>
        <button class="tab" type="button" data-tab="stats" aria-selected="false">Stats</button>
        <button class="tab" type="button" data-tab="playlist" aria-selected="false">Playlist</button>
        <button class="tab" type="button" data-tab="transfers" aria-selected="false">Transfers</button>
      </nav>

      <section class="view" data-view="search">
        <form class="toolbar" id="search-form">
          <input id="query" name="query" autocomplete="off" placeholder="Search YouTube" aria-label="Search YouTube" />
          <button type="submit">Search</button>
        </form>
        <div class="results" id="results">
          <div class="empty">Enter a query to search YouTube.</div>
        </div>
      </section>

      <section class="view" data-view="stats" hidden>
        <div class="toolbar">
          <input id="stats-limit" type="number" min="0" max="100" value="10" aria-label="Recent stats limit" />
          <button id="stats-refresh" type="button">Refresh</button>
        </div>
        <div id="stats-status" class="status"></div>
        <div id="stats-results" class="results">
          <div class="empty">No stats loaded.</div>
        </div>
      </section>

      <section class="view" data-view="playlist" hidden>
        <div class="toolbar multi">
          <input id="playlist-name" type="text" placeholder="Playlist name" aria-label="Playlist name" />
          <button id="playlist-refresh" type="button">Refresh</button>
          <button id="playlist-preview" type="button">Preview</button>
          <button id="playlist-apply" type="button">Apply</button>
        </div>
        <div id="playlist-status" class="status"></div>
        <div id="playlist-results" class="results">
          <div class="empty">No playlist candidates loaded.</div>
        </div>
      </section>

      <section class="view" data-view="transfers" hidden>
        <div class="toolbar multi">
          <span></span>
          <button id="transfers-refresh" type="button">Refresh</button>
          <button id="transfers-retry-all" type="button">Retry all</button>
          <button id="transfers-prune" type="button">Prune missing</button>
        </div>
        <div id="transfers-status" class="status"></div>
        <div id="transfers-results" class="results">
          <div class="empty">No transfer queue loaded.</div>
        </div>
      </section>
    </section>
  </main>
  <script>
    {{MCP_EXT_APPS_BUNDLE}}
  </script>
  <script>
    {{YOUTUBE_SEARCH_APP_SCRIPT}}
  </script>
</body>
</html>
