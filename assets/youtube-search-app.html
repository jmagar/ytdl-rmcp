<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YouTube search</title>
  <style>
    :root {
      --aurora-page-bg: #07131c;
      --aurora-panel-medium: #102532;
      --aurora-panel-strong: #132d3d;
      --aurora-control-surface: #0d202c;
      --aurora-border-default: #1d3d4e;
      --aurora-border-strong: #2a5870;
      --aurora-text-primary: #e6f4fb;
      --aurora-text-muted: #a7bcc9;
      --aurora-accent-primary: #29b6f6;
      --aurora-accent-pink: #f9a8c4;
      --aurora-active-glow: 0 0 0 1px color-mix(in srgb, var(--aurora-accent-primary) 78%, transparent), 0 0 26px color-mix(in srgb, var(--aurora-accent-primary) 22%, transparent);
      --aurora-radius-1: 8px;
      --aurora-radius-3: 8px;
      --aurora-shadow-strong: 0 24px 70px rgba(0, 0, 0, 0.38);
      color-scheme: dark;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--aurora-page-bg);
      color: var(--aurora-text-primary);
      font: 14px/1.45 Inter, ui-sans-serif, system-ui, sans-serif;
    }
    .shell { padding: 18px; }
    .panel {
      border: 1px solid var(--aurora-border-strong);
      border-radius: var(--aurora-radius-3);
      background: var(--aurora-panel-strong);
      box-shadow: var(--aurora-shadow-strong), inset 0 1px 0 rgba(255,255,255,0.05);
      overflow: hidden;
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 14px;
      background: var(--aurora-panel-medium);
      border-bottom: 1px solid var(--aurora-border-default);
    }
    input {
      min-width: 0;
      height: 40px;
      border-radius: var(--aurora-radius-1);
      border: 1px solid var(--aurora-border-default);
      background: var(--aurora-control-surface);
      color: var(--aurora-text-primary);
      padding: 0 12px;
      font: 560 13px/1 Inter, ui-sans-serif, system-ui, sans-serif;
      outline: none;
    }
    input:focus,
    button:focus-visible { border-color: var(--aurora-border-strong); box-shadow: var(--aurora-active-glow); }
    button {
      height: 40px;
      border-radius: var(--aurora-radius-1);
      border: 1px solid var(--aurora-border-strong);
      background: color-mix(in srgb, var(--aurora-accent-primary) 18%, var(--aurora-control-surface));
      color: var(--aurora-text-primary);
      font: 650 13px/1 Inter, ui-sans-serif, system-ui, sans-serif;
      padding: 0 14px;
      cursor: pointer;
    }
    .results { display: grid; gap: 1px; background: var(--aurora-border-default); }
    .result {
      display: grid;
      grid-template-columns: 112px 1fr auto;
      gap: 14px;
      padding: 12px;
      background: var(--aurora-panel-strong);
      border: 1px solid transparent;
    }
    .result[aria-selected="true"] { border-color: var(--aurora-border-strong); box-shadow: inset 3px 0 0 var(--aurora-accent-primary); }
    .thumb {
      width: 112px;
      aspect-ratio: 16 / 9;
      border-radius: 8px;
      object-fit: cover;
      background: var(--aurora-control-surface);
    }
    .title { margin: 0 0 5px; font: 760 14px/1.2 Manrope, Inter, sans-serif; }
    .copy { min-width: 0; }
    .title,
    .meta { overflow-wrap: anywhere; }
    .meta { color: var(--aurora-text-muted); font-size: 12px; }
    .actions { display: flex; align-items: center; gap: 8px; }
    .actions button { height: 32px; padding: 0 10px; }
    .actions .download { border-color: color-mix(in srgb, var(--aurora-accent-pink) 55%, var(--aurora-border-strong)); background: color-mix(in srgb, var(--aurora-accent-pink) 13%, var(--aurora-control-surface)); }
    .empty { padding: 30px; color: var(--aurora-text-muted); text-align: center; }
    @media (max-width: 640px) {
      .toolbar { grid-template-columns: 1fr; }
      .result { grid-template-columns: 88px 1fr; }
      .thumb { width: 88px; }
      .actions { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel">
      <form class="toolbar" id="search-form">
        <input id="query" name="query" autocomplete="off" placeholder="Search YouTube" />
        <button type="submit">Search</button>
      </form>
      <div class="results" id="results">
        <div class="empty">Enter a query to search YouTube.</div>
      </div>
    </section>
  </main>
  <script>
    {{MCP_EXT_APPS_BUNDLE}}
  </script>
  <script>
    const { App } = window.McpExtApps;
    const resultsEl = document.querySelector("#results");
    const form = document.querySelector("#search-form");
    const queryEl = document.querySelector("#query");
    const app = new App({ name: "YouTube search", version: "1.0.0" });
    const isDemo = new URLSearchParams(window.location.search).has("demo");
    const demoResults = [
      {
        title: "Slow Pulp - Falling Apart Live",
        url: "https://www.youtube.com/watch?v=abc123",
        uploader: "Slow Pulp",
        duration: 215,
        thumbnail: "https://i.ytimg.com/vi/dQw4w9WgXcQ/hqdefault.jpg"
      },
      {
        title: "Slow Pulp - Idaho Live",
        url: "https://www.youtube.com/watch?v=def456",
        uploader: "Live Room",
        duration: 188,
        thumbnail: "https://i.ytimg.com/vi/jNQXAC9IVRw/hqdefault.jpg"
      }
    ];

    function formatDuration(seconds) {
      if (!seconds) return "unknown duration";
      const total = Math.round(seconds);
      return `${Math.floor(total / 60)}:${String(total % 60).padStart(2, "0")}`;
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      })[char]);
    }

    function showStatus(message) {
      resultsEl.innerHTML = `<div class="empty">${escapeHtml(message)}</div>`;
    }

    function prependStatus(message) {
      resultsEl.insertAdjacentHTML("afterbegin", `<div class="empty">${escapeHtml(message)}</div>`);
    }

    function render(results) {
      if (!results || results.length === 0) {
        showStatus("No results.");
        return;
      }
      resultsEl.innerHTML = results.map((item, index) => `
        <article class="result" aria-selected="${index === 0}">
          <img class="thumb" src="${escapeHtml(item.thumbnail || "")}" alt="" />
          <div class="copy">
            <h2 class="title">${escapeHtml(item.title || "Untitled")}</h2>
            <div class="meta">${escapeHtml(item.uploader || "Unknown channel")} - ${formatDuration(item.duration)}</div>
            <div class="meta">${escapeHtml(item.url)}</div>
          </div>
          <div class="actions">
            <button type="button" data-action="probe" data-url="${escapeHtml(item.url)}">Probe</button>
            <button type="button" class="download" data-action="audio" data-url="${escapeHtml(item.url)}">Audio</button>
            <button type="button" class="download" data-action="video" data-url="${escapeHtml(item.url)}">Video</button>
          </div>
        </article>
      `).join("");
    }

    function toolText(result, fallback) {
      return result?.content?.find((item) => item.type === "text")?.text || fallback;
    }

    // Some MCP hosts (e.g. the lab proxy in "code mode") hide regular tools and
    // only expose them through a code-execution sandbox the embedded app cannot
    // reach. They reject our callServerTool with an envelope like
    // {"error":{"kind":"not_found","message":"tool `youtube_download` is hidden
    // while code_mode mode is enabled"}}. callServerTool is the only channel an
    // MCP App has, so translate that into a clear, actionable message instead of
    // surfacing the raw JSON envelope.
    function friendlyError(message) {
      const text = String(message || "");
      if (/hidden while code[_ ]?mode/i.test(text)) {
        return "This panel can't reach its YouTube tools while the MCP host is in code mode. Disable code mode on the host to probe, download, or re-search from here.";
      }
      try {
        const inner = JSON.parse(text)?.error?.message;
        if (inner) return inner;
      } catch (_) {
        // Not a JSON envelope; fall through to the original text.
      }
      return text || "Action failed.";
    }

    function parseResult(result) {
      if (result?.isError) {
        throw new Error(toolText(result, "Search failed."));
      }
      if (result?.structuredContent?.results) {
        return result.structuredContent;
      }
      const text = result?.content?.find((item) => item.type === "text")?.text;
      if (!text) throw new Error("Search returned no readable payload.");
      try {
        return JSON.parse(text);
      } catch (error) {
        throw new Error(`Search returned invalid JSON: ${error.message}`);
      }
    }

    function renderPayload(result) {
      const payload = parseResult(result);
      if (payload.query) queryEl.value = payload.query;
      render(payload.results || []);
    }

    function actionToolCall(action, url) {
      const calls = {
        probe: { name: "youtube_probe", arguments: { urls: url } },
        audio: { name: "youtube_download", arguments: { urls: url, mode: "audio" } },
        video: { name: "youtube_download", arguments: { urls: url, mode: "video" } }
      };
      return calls[action];
    }

    function showConnectionError() {
      if (!isDemo) {
        showStatus("Could not connect to the MCP host.");
      }
    }

    app.ontoolinput = (params) => {
      if (params?.query) queryEl.value = params.query;
    };

    app.ontoolresult = (result) => {
      renderPayload(result);
    };

    app.onerror = showConnectionError;

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const query = queryEl.value.trim();
      if (!query) return;
      showStatus("Searching...");
      try {
        const response = await app.callServerTool({
          name: "youtube_search",
          arguments: { query, limit: 10, response_format: "json" }
        });
        renderPayload(response);
      } catch (error) {
        showStatus(friendlyError(error.message));
      }
    });

    resultsEl.addEventListener("click", async (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const url = button.dataset.url;
      const action = button.dataset.action;
      const toolCall = actionToolCall(action, url);
      if (!toolCall) return;
      try {
        const response = await app.callServerTool(toolCall);
        if (response?.isError) {
          throw new Error(toolText(response, "Action failed."));
        }
        prependStatus(friendlyError(toolText(response, "Action completed.")));
      } catch (error) {
        prependStatus(friendlyError(error.message));
      }
    });

    if (isDemo) {
      queryEl.value = "slow pulp live";
      render(demoResults);
    }

    app.connect().catch(showConnectionError);
  </script>
</body>
</html>
